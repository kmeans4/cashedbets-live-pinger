name: live-tick

# Fires the CashedBets live-ingestion endpoint every 5 minutes. Outside NFL
# game windows the endpoint's database gate exits in milliseconds with zero
# Tank01 calls, so off-hours ticks are effectively free.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: live-tick
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Ping live ingestion endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          for attempt in 1 2 3; do
            if curl -fsS -o /dev/null -m 120 -H "Authorization: Bearer ${CRON_SECRET}" "https://cashedbets-v2.vercel.app/api/cron/tank01/live"; then
              echo "tick ok"
              exit 0
            fi
            echo "attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          echo "all attempts failed"
          exit 1
